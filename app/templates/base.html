<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SAP Voice Middleware{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .status-badge-none { background: #6c757d; }
    .status-badge-in_progress { background: #fd7e14; }
    .status-badge-complete { background: #198754; }
    .passage-card { font-size: 1.1rem; line-height: 1.8; background: #fff; border-left: 4px solid #0d6efd; }
    #waveform-container { height: 60px; background: #212529; border-radius: 8px; overflow: hidden; }
    .confidence-bar { height: 8px; border-radius: 4px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/dashboard/">&#127908; SAP Voice Middleware</a>
      <div class="d-flex gap-3">
        <a class="nav-link text-white" href="/dashboard/">Workers</a>
        <a class="nav-link text-white" href="/dashboard/demo">Demo</a>
        <a class="nav-link text-white-50" href="/docs" target="_blank">API Docs</a>
      </div>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
