name: CI

on:
  push:
    branches: [main, develop, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi==0.115.5 uvicorn[standard]==0.32.1 sqlmodel==0.0.21 \
            pydantic==2.10.3 pydantic-settings==2.6.1 asyncpg==0.30.0 \
            aiosqlite==0.20.0 alembic==1.14.0 aiofiles==24.1.0 \
            python-multipart==0.0.18 pydub==0.25.1 httpx==0.28.1 \
            tenacity==9.0.0 rapidfuzz==3.10.1 jinja2==3.1.4 \
            pytest==8.3.4 pytest-asyncio==0.24.0 pytest-cov==6.0.0 ruff==0.8.4

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_voice.db
          API_KEYS: ""
          GROQ_API_KEY: "test-key-not-real"
          EMBEDDING_MODEL: mock
          AUDIO_STORAGE_PATH: /tmp/test-audio
          ENROLLMENT_MIN_DURATION_SECONDS: "1"
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sap-voice-middleware:ci .
