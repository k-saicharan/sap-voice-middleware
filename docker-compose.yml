services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: voice_profiles
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "voice"]
      interval: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://voice:${POSTGRES_PASSWORD:-changeme}@db:5432/voice_profiles
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      API_KEYS: ${API_KEYS:-}
      AUDIO_STORAGE_PATH: /data/audio
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mock}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      PUBLIC_PROFILE_ENDPOINT: "true"
    volumes:
      - audio_data:/data/audio

volumes:
  pgdata:
  audio_data:
